<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>나도 투자왕</title>
    <style>
        /* [검토 완료] 스타일은 이전과 동일하게 유지하여 UI 일관성을 확보했습니다. */
        :root {
            --toss-blue: #3182f6;
            --toss-red: #f04452;
            --bg-gray: #f2f4f6;
            --text-main: #333d4b;
            --text-sub: #8b95a1;
            --white: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-gray);
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        .app-layout {
            max-width: 500px;
            margin: 0 auto;
            background-color: var(--bg-gray);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header-card {
            background-color: var(--white);
            padding: 32px 24px;
            border-bottom-left-radius: 24px;
            border-bottom-right-radius: 24px;
            margin-bottom: 12px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .ranking-badge {
            background-color: #e8f3ff;
            color: var(--toss-blue);
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 700;
        }

        /* [연결 포인트 1] 명예의 전당 텍스트 링크 스타일 */
        .hall-link {
            text-decoration: none;
            color: var(--text-sub);
            font-size: 13px;
            font-weight: 500;
        }

        .yield-label {
            font-size: 15px;
            color: var(--text-sub);
            margin-bottom: 6px;
        }

        .yield-value {
            font-size: 36px;
            font-weight: 800;
            color: var(--toss-red);
            margin: 0 0 12px 0;
        }

        .asset-value {
            font-size: 19px;
            font-weight: 600;
            color: var(--text-main);
        }

        .action-area {
            padding: 12px 20px;
        }

        /* [연결 포인트 2] 메인 버튼을 감싸는 링크 스타일 */
        .main-btn-link {
            text-decoration: none;
            display: block;
        }

        .main-button {
            background-color: var(--toss-blue);
            color: var(--white);
            width: 100%;
            padding: 20px;
            border: none;
            border-radius: 18px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 16px rgba(49, 130, 246, 0.15);
        }

        .tool-list {
            padding: 20px;
        }

        .list-title {
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 16px;
            padding-left: 4px;
        }

        .list-item {
            background-color: var(--white);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .item-info { display: flex; align-items: center; gap: 14px; }
        .item-icon { font-size: 24px; }
        .item-name { font-size: 16px; font-weight: 600; }
        .item-reward { font-size: 13px; color: var(--toss-blue); font-weight: 600; }

        /* 하단 탭바 스타일 */
        .bottom-tab {
            margin-top: auto;
            background-color: var(--white);
            display: flex;
            justify-content: space-around;
            padding: 16px 0 32px 0;
            border-top: 1px solid #eeeeee;
        }

        /* [연결 포인트 3, 4] 탭 메뉴를 클릭 가능하게 수정 */
        .tab-item { 
            text-align: center; 
            color: var(--text-sub); 
            font-size: 11px; 
            flex: 1; 
            text-decoration: none;
        }
        .tab-item.active { color: var(--text-main); font-weight: 700; }
        .tab-icon { font-size: 22px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

<div class="app-layout">
    <div class="header-card">
        <div class="header-top">
            <div class="ranking-badge">🏆 상위 15% (1,240위)</div>
            <a href="ranking.html" class="hall-link">명예의 전당 〉</a>
        </div>
        <div class="yield-label">나의 현재 수익률</div>
        <h1 class="yield-value">+ 12.4%</h1>
        <div class="asset-value">11,240,000 원</div>
    </div>

    <div class="action-area">
        <a href="trade.html" class="main-btn-link">
            <button class="main-button">📈 투자하러 가기</button>
        </a>
    </div>

    <div class="tool-list">
        <div class="list-title">내 분석 포인트: 🟡 2 P</div>
        
        <div class="list-item">
            <div class="item-info">
                <span class="item-icon">📺</span>
                <span class="item-name">광고 보고 1포인트 받기</span>
            </div>
            <span class="item-reward">무료</span>
        </div>

        <div class="list-item" style="opacity: 0.6;">
            <div class="item-info">
                <span class="item-icon">🔒</span>
                <span class="item-name">오늘 급등 종목 TOP 3</span>
            </div>
            <span class="item-reward">1 P</span>
        </div>
    </div>

    <nav class="bottom-tab">
        <a href="index.html" class="tab-item active"><span class="tab-icon">🏠</span>홈</a>
        <a href="trade.html" class="tab-item"><span class="tab-icon">📊</span>매매장</a>
        <a href="ranking.html" class="tab-item"><span class="tab-icon">🏆</span>명예전당</a>
        <a href="#" class="tab-item"><span class="tab-icon">⚙️</span>설정</a>
    </nav>
</div>

</body>
</html>

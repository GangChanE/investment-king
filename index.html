<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>나도 투자왕</title>
    <style>
        /* 1. 토스 감성 디자인 설정 (TDS 스타일 반영) */
        :root {
            --toss-blue: #3182f6;
            --toss-red: #f04452;
            --bg-gray: #f2f4f6;
            --text-main: #333d4b;
            --text-sub: #8b95a1;
            --white: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-gray);
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        /* 2. 화면 전체 레이아웃 (게임 몰입을 위한 풀스크린 구성) */
        .app-layout {
            max-width: 500px;
            margin: 0 auto;
            background-color: var(--bg-gray);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 3. 상단 정보 영역 (내 자산과 랭킹) */
        .header-card {
            background-color: var(--white);
            padding: 32px 24px;
            border-bottom-left-radius: 24px;
            border-bottom-right-radius: 24px;
            margin-bottom: 12px;
        }

        .ranking-badge {
            display: inline-block;
            background-color: #e8f3ff;
            color: var(--toss-blue);
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .yield-label {
            font-size: 15px;
            color: var(--text-sub);
            margin-bottom: 6px;
        }

        .yield-value {
            font-size: 36px;
            font-weight: 800;
            color: var(--toss-red);
            margin: 0 0 12px 0;
        }

        .asset-value {
            font-size: 19px;
            font-weight: 600;
            color: var(--text-main);
        }

        /* 4. 핵심 액션 버튼 영역 (1 thing for 1 page) */
        .action-area {
            padding: 12px 20px;
        }

        .main-button {
            background-color: var(--toss-blue);
            color: var(--white);
            width: 100%;
            padding: 20px;
            border: none;
            border-radius: 18px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 16px rgba(49, 130, 246, 0.15);
        }

        /* 5. 분석 도구 리스트 (수익 모델 영역) */
        .tool-list {
            padding: 20px;
        }

        .list-title {
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 16px;
            padding-left: 4px;
        }

        .list-item {
            background-color: var(--white);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: opacity 0.2s;
        }

        .list-item:active { opacity: 0.7; }

        .item-info { display: flex; align-items: center; gap: 14px; }
        .item-icon { font-size: 24px; }
        .item-name { font-size: 16px; font-weight: 600; }
        .item-reward { font-size: 13px; color: var(--toss-blue); font-weight: 600; }

        /* 하단 탭바 */
        .bottom-tab {
            margin-top: auto;
            background-color: var(--white);
            display: flex;
            justify-content: space-around;
            padding: 16px 0 32px 0;
            border-top: 1px solid #eeeeee;
        }

        .tab-item { text-align: center; color: var(--text-sub); font-size: 11px; flex: 1; }
        .tab-item.active { color: var(--text-main); font-weight: 700; }
        .tab-icon { font-size: 22px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

<div class="app-layout">
    <div class="header-card">
        <div class="ranking-badge">🏆 상위 15% (1,240위)</div>
        <div class="yield-label">나의 현재 수익률</div>
        <h1 class="yield-value">+ 12.4%</h1>
        <div class="asset-value">11,240,000 원</div>
    </div>

    <div class="action-area">
        <button class="main-button">📈 투자하러 가기</button>
    </div>

    <div class="tool-list">
        <div class="list-title">내 분석 포인트: 🟡 2 P</div>
        
        <div class="list-item">
            <div class="item-info">
                <span class="item-icon">📺</span>
                <span class="item-name">광고 보고 1포인트 받기</span>
            </div>
            <span class="item-reward">무료</span>
        </div>

        <div class="list-item" style="opacity: 0.6;">
            <div class="item-info">
                <span class="item-icon">🔒</span>
                <span class="item-name">오늘 급등 종목 TOP 3</span>
            </div>
            <span class="item-reward">1 P</span>
        </div>
    </div>

    <nav class="bottom-tab">
        <div class="tab-item active"><span class="tab-icon">🏠</span>홈</div>
        <div class="tab-item"><span class="tab-icon">📊</span>매매장</div>
        <div class="tab-item"><span class="tab-icon">🏆</span>명예전당</div>
        <div class="tab-item"><span class="tab-icon">⚙️</span>설정</div>
    </nav>
</div>

</body>
</html>
